name: Rust Multi-Platform Build

on:
  push:
    branches: [ "main" ]
    #tags:
    #  - "v*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:

          # ========== Linux ==========
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            use-cross: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            use-cross: true

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use-cross: false

          #- os: ubuntu-latest
          #  target: armv7-unknown-linux-gnueabihf
          #  use-cross: true

          #- os: ubuntu-latest
          #  target: riscv64gc-unknown-linux-gnu
          #  use-cross: true

          # ========== macOS ==========
          - os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false

          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false

          # ========== Windows ==========
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            use-cross: false

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        #with:
          # dtolnay/rust-toolchain@master 版本 支持单位： offset, which may be written in years, months, weeks, or days. 【stable minus 8 releases】
          #toolchain: stable 18 months ago

      #- run: cargo test --all-features

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cross (Linux only)
        if: matrix.use-cross == true
        run: |
          unset RUSTFLAGS
          unset CARGO_BUILD_TARGET
          cargo install cross

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      #- name: Install LLVM 16
      #  if: contains(matrix.target, '-linux-gnu')
      #  run: |
      #    sudo apt-get install -y clang-16 libclang-16-dev
      #    echo "LIBCLANG_PATH=/usr/lib/llvm-16/lib" >> $GITHUB_ENV

      # zigbuild (gnu) ≠ 需要 crt-static
      - name: Set RUSTFLAGS (musl only, NOT zig)
        if: contains(matrix.target, 'musl')
        run: echo "RUSTFLAGS=-C target-feature=+crt-static" >> $GITHUB_ENV

      # ========== Build ==========
      - name: Build (cross)
        if: matrix.use-cross == true
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (native)
        if: matrix.use-cross == false
        run: cargo build --release --target ${{ matrix.target }}

      - name: Install tree (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y tree

      - name: Install tree (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install tree

      - name: Install tree (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install tree -y

      - name: Show target directory tree
        #if: runner.os == 'Linux'
        run: |
          #if [ "${{ runner.os }}" = "Linux" ]; then
          #  sudo apt-get update
          #  sudo apt-get install -y tree
          
          #elif [ "${{ runner.os }}" = "macOS" ]; then
          #  brew install tree
          
          #elif [ "${{ runner.os }}" = "Windows" ]; then
          #  choco install tree -y
          #fi
          # sudo apt update
          # sudo apt install -y tree
          #tree -L 4 target || true
          if [ "${{ runner.os }}" = "Linux" ]; then
              echo "测试多系统安装 tree"
          fi
          

      # ========== Package ==========
      # powershell 复制文件
      # New-Item -ItemType Directory -Force -Path "dist" 创建文件夹
      # Copy-Item -Path "C:\source\folder" -Destination "C:\target\" -Recurse  复制整个文件夹
      # Copy-Item -Path "target\release\your_app.exe" -Destination "dist\" -Force 强制覆盖
      - name: Package
        shell: bash
        run: |
          mkdir -p dist
          NAME=${{ github.event.repository.name }}

          if [[ "${{ runner.os }}" == "Windows" ]]; then
            BIN=target/${{ matrix.target }}/release/$NAME.exe
            ZIP=$NAME-${{ matrix.target }}.zip
            powershell Compress-Archive -Path $BIN -DestinationPath dist/$ZIP
            powershell Copy-Item -Path $BIN -Destination "dist\" -Force
          else
            BIN=target/${{ matrix.target }}/release/$NAME
            TAR=$NAME-${{ matrix.target }}.tar.gz
            tar -czvf dist/$TAR -C $(dirname $BIN) $(basename $BIN)
            cp $BIN dist/
          fi

      - name: Upload
        uses: actions/upload-artifact@v6
        with:
          name: ${{ github.event.repository.name }}-${{ matrix.target }}
          path: dist/*
  deploy:
    needs:
      - build
    if: always() && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - name: download
        uses: actions/download-artifact@v6
        with:
          pattern: ${{ github.event.repository.name }}-*
          merge-multiple: true
          path: /tmp/${{ github.event.repository.name }}
          # 不是跨yml执行，默认就是当前run id 【${{ github.run_id }}】
          run-id: ${{ github.run_id }}
          #run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
      - name: ls tmp
        run: |
          ls -alh /tmp/${{ github.event.repository.name }}*